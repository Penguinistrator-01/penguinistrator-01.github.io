<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打字蛇 · fireflymax</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'Segoe UI', system-ui, sans-serif;
            background: #fafbfc;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }
        .post {
            max-width: 720px;
            width: 100%;
            background: #fff;
            border: 1px solid #e2e5ea;
            border-radius: 14px;
            padding: 2.5rem 2.5rem 2.2rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .post h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            letter-spacing: -0.3px;
        }
        .post .date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: #9ca0b0;
            margin-bottom: 1.8rem;
        }
        .post .game-wrapper {
            margin: 1.2rem 0 0.5rem;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #eef0f4;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .game-container {
            position: relative;
            background: #f7f8fa;
            padding: 1.5rem 1.5rem 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .canvas-wrap {
            position: relative;
            border-radius: 10px;
            background: #1a1a2e;
            border: 1px solid #d0d4de;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.04);
        }
        #gameCanvas {
            display: block;
            border-radius: 8px;
            width: 100%;
            height: auto;
            background: #1a1a2e;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0.6rem 0.2rem 0.2rem;
            color: #3d4052;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.2px;
            border-top: 1px solid #eef0f4;
            margin-top: 0.5rem;
        }
        .info-panel span {
            background: #f2f4f8;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            color: #2c2f40;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            border: 1px solid #e6e9ef;
        }
        .info-panel span b {
            font-weight: 500;
            color: #1a1a2e;
        }
        .controls {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 0.3rem 1.2rem;
            font-size: 0.8rem;
            font-family: 'Noto Sans SC', sans-serif;
            border: 1px solid #d0d4de;
            border-radius: 40px;
            background: #ffffff;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            letter-spacing: 0.3px;
        }
        .btn:hover {
            background: #f2f4f8;
            border-color: #b0b8c8;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .btn-start {
            background: #1a1a2e;
            border-color: #1a1a2e;
            color: white;
        }
        .btn-start:hover {
            background: #2d2f4a;
            border-color: #2d2f4a;
        }
        .btn-music {
            background: #f2f4f8;
        }
        .status-bar {
            font-size: 0.7rem;
            color: #8d92a8;
            margin-top: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.2px;
            border-top: 1px solid #eef0f4;
            padding-top: 0.5rem;
            width: 100%;
            text-align: center;
        }
        .target-char {
            position: absolute;
            top: 10px;
            right: 12px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(4px);
            color: #1a1a2e;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border: 1px solid #e2e5ea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            font-family: 'JetBrains Mono', monospace;
        }
        .input-display {
            position: absolute;
            top: 10px;
            left: 12px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(4px);
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            border: 1px solid #e2e5ea;
            color: #5a5d6e;
            font-family: 'JetBrains Mono', monospace;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .input-display.correct { border-color: #3b9e6d; background: #eafaf2; color: #1a5a3a; }
        .input-display.wrong { border-color: #d45a6a; background: #fdeeef; color: #8f3a48; }
        .level-info {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
            color: #1a1a2e;
            padding: 0.15rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            border: 1px solid #e2e5ea;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.3px;
            font-weight: 400;
        }
        .level-progress {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
            padding: 0.1rem 1rem;
            border-radius: 40px;
            font-size: 0.65rem;
            border: 1px solid #e2e5ea;
            color: #5a5d6e;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
        }
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(26, 26, 46, 0.85);
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            z-index: 20;
            padding: 2rem;
        }
        .start-screen h2, .game-over-screen h2 {
            color: #f2f4f8;
            font-weight: 400;
            font-size: 1.5rem;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
        }
        .start-screen p, .game-over-screen p {
            color: #c8ccdc;
            font-size: 0.85rem;
            line-height: 1.7;
            text-align: center;
            max-width: 400px;
        }
        .start-screen p span, .game-over-screen p span {
            color: #eef0f4;
            font-weight: 500;
        }
        .start-screen .btn, .game-over-screen .btn {
            margin-top: 1.2rem;
            background: #ffffff;
            border: none;
            padding: 0.4rem 2rem;
            font-size: 0.9rem;
            border-radius: 40px;
        }
        .start-screen .btn:hover, .game-over-screen .btn:hover {
            background: #eef0f4;
        }
        .sound-indicator {
            display: inline-block;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 0.2rem;
            line-height: 1;
        }
        .hint-text {
            font-size: 0.7rem;
            color: #9ca0b0;
            margin-top: 0.3rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.2px;
        }
        .post .signature {
            margin-top: 1.2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: #b0b4c4;
            border-top: 1px solid #eef0f4;
            padding-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .post .signature .tag {
            background: #f2f4f8;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #5a5d6e;
        }
        a { color: #5b8def; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .back-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }
        @media (max-width: 600px) {
            .post { padding: 1.5rem; }
            .game-container { padding: 1rem 0.5rem; }
            .target-char, .input-display { font-size: 0.9rem; padding: 0.1rem 0.8rem; }
            .level-info { font-size: 0.6rem; padding: 0.1rem 0.6rem; }
            .info-panel span { font-size: 0.65rem; padding: 0.1rem 0.6rem; }
        }
    </style>
</head>
<body>
<div class="post">
    <h1>打字蛇 · fireflymax</h1>
    <div class="date">2026-06-29 · 贪吃蛇打字</div>

    <div class="game-wrapper">
        <div class="game-container">
            <div class="canvas-wrap">
                <canvas id="gameCanvas" width="600" height="450"></canvas>
                <div class="level-info">关卡 <span id="levelDisplay">1</span>/10</div>
                <div class="target-char" id="targetChar">A</div>
                <div class="input-display" id="inputDisplay">等待 <span id="inputChar">?</span></div>
                <div class="level-progress">进度 <span id="progress">0</span>/10</div>
                <div class="start-screen" id="startScreen">
                    <h2>⌨️ 打字蛇</h2>
                    <p>先敲对 <span style="color:#ffb3b3;">目标字符</span>，再操控方向<br>
                    蛇准备好才能吃掉食物 · 每关消灭10个</p>
                    <button class="btn" onclick="startGame()">开始游戏</button>
                </div>
                <div class="game-over-screen" id="gameOverScreen" style="display:none">
                    <h2>✦ 终章</h2>
                    <p>得分 <b id="finalScore" style="color:#fff;">0</b> · 关卡 <b id="finalLevel" style="color:#fff;">1</b></p>
                    <p id="failReason" style="color:#d4a0a8;"></p>
                    <button class="btn" onclick="startGame()">再来一次</button>
                </div>
            </div>

            <div class="info-panel">
                <span>得分 <b id="score">0</b></span>
                <span>关卡 <b id="level">1</b></span>
                <span>速度 <b id="speed">1</b></span>
            </div>

            <div class="controls">
                <button class="btn btn-start" onclick="startGame()">⟳ 开始</button>
                <button class="btn btn-music" onclick="toggleMusic()">♫ <span id="musicStatus">开</span></button>
                <span class="sound-indicator" onclick="toggleMusic()">🔊</span>
            </div>
            <div class="status-bar">方向键移动 · 先输对字符再吃食物</div>
        </div>
    </div>

    <div class="signature">
        <span>打字蛇 · fireflymax</span>
        <span class="tag">⌨️ 贪吃蛇</span>
    </div>
    <div style="margin-top: 0.5rem; font-size: 0.75rem; color: #b0b4c4;">
        <a href="#" class="back-link">← 返回终端</a>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 15;
        const cols = canvas.width / gridSize;
        const rows = canvas.height / gridSize;

        let snake, direction, food, targetChar, lastInputChar, isReady;
        let score, level, charsCollected;
        let gameLoop, speed;
        let isGameRunning = false;
        let musicPlaying = true;
        let audioContext, bgMusicInterval;

        const chars = {
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lower: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            special: '，。？！、；："\'【】{}（）(),.?!\''
        };

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(freq, duration, type='square') {
            if (!musicPlaying) return;
            try {
                initAudio();
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.value = 0.08;
                gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.start();
                osc.stop(audioContext.currentTime + duration);
            } catch(e) {}
        }

        function playEatSound() {
            playSound(523, 0.1, 'sine');
            setTimeout(() => playSound(659, 0.1, 'sine'), 50);
            setTimeout(() => playSound(784, 0.15, 'sine'), 100);
        }
        function playWrongSound() { playSound(150, 0.3, 'sawtooth'); }
        function playLevelUpSound() {
            [0,100,200,300,400].forEach((delay, i) => {
                setTimeout(() => playSound(400 + i * 100, 0.15, 'sine'), delay);
            });
        }
        function playGameOverSound() {
            playSound(400, 0.2);
            setTimeout(() => playSound(300, 0.2), 150);
            setTimeout(() => playSound(200, 0.3), 300);
            setTimeout(() => playSound(100, 0.5), 450);
        }
        function playReadySound() {
            playSound(600, 0.1, 'sine');
            setTimeout(() => playSound(800, 0.15, 'sine'), 80);
        }

        function startBgMusic() {
            if (!musicPlaying || bgMusicInterval) return;
            const notes = [262, 294, 330, 349, 392, 349, 330, 294];
            let noteIndex = 0;
            bgMusicInterval = setInterval(() => {
                if (musicPlaying) {
                    playSound(notes[noteIndex] / 2, 0.3, 'sine');
                    noteIndex = (noteIndex + 1) % notes.length;
                }
            }, 400);
        }
        function stopBgMusic() {
            if (bgMusicInterval) {
                clearInterval(bgMusicInterval);
                bgMusicInterval = null;
            }
        }

        function toggleMusic() {
            musicPlaying = !musicPlaying;
            document.getElementById('musicStatus').textContent = musicPlaying ? '开' : '关';
            document.querySelector('.sound-indicator').textContent = musicPlaying ? '🔊' : '🔇';
            if (musicPlaying) startBgMusic();
            else stopBgMusic();
        }

        function getRandomChar() {
            let charSet = chars.upper;
            if (level >= 2) charSet += chars.lower;
            if (level >= 3) charSet += chars.numbers;
            if (level >= 4) charSet += chars.special;

            // 排除 W A S D（大小写）
            const excludeSet = new Set(['W', 'A', 'S', 'D', 'w', 'a', 's', 'd']);
            let availableChars = charSet.split('').filter(c => !excludeSet.has(c));

            // 如果可用字符集为空（极端情况），则从原字符集取
            if (availableChars.length === 0) {
                availableChars = charSet.split('');
            }

            return availableChars[Math.floor(Math.random() * availableChars.length)];
        }

        function initGame() {
            snake = [{x: Math.floor(cols/2), y: Math.floor(rows/2)}];
            direction = {x: 0, y: 0};
            score = 0;
            level = 1;
            charsCollected = 0;
            speed = 200;
            lastInputChar = '';
            isReady = false;
            spawnFood();
            updateUI();
        }

        function spawnFood() {
            let validPosition = false;
            while (!validPosition) {
                food = {
                    x: Math.floor(Math.random() * cols),
                    y: Math.floor(Math.random() * rows),
                    char: getRandomChar()
                };
                validPosition = !snake.some(s => s.x === food.x && s.y === food.y);
            }
            targetChar = food.char;
            lastInputChar = '';
            isReady = false;
            document.getElementById('targetChar').textContent = targetChar;
            document.getElementById('inputChar').textContent = '?';
            updateInputDisplay();
        }

        function updateInputDisplay() {
            const display = document.getElementById('inputDisplay');
            if (isReady) {
                display.className = 'input-display correct';
                document.getElementById('inputChar').textContent = lastInputChar + ' ✓';
            } else {
                display.className = 'input-display';
                document.getElementById('inputChar').textContent = '?';
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('levelDisplay').textContent = level;
            document.getElementById('progress').textContent = charsCollected;
            document.getElementById('speed').textContent = Math.ceil(200 / speed);
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                const hue = (index * 10 + score * 5) % 360;
                let bodyColor = `hsl(${hue}, 70%, 55%)`;
                let glowColor = `hsl(${hue}, 70%, 55%)`;
                if (index === 0 && isReady) {
                    bodyColor = '#3b9e6d';
                    glowColor = '#3b9e6d';
                }
                ctx.shadowBlur = index === 0 ? 12 : 4;
                ctx.shadowColor = glowColor;
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize/2, segment.y * gridSize + gridSize/2, 0,
                    segment.x * gridSize + gridSize/2, segment.y * gridSize + gridSize/2, gridSize/2
                );
                gradient.addColorStop(0, bodyColor);
                gradient.addColorStop(1, `hsl(${hue}, 70%, 35%)`);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2, 4);
                ctx.fill();
                ctx.shadowBlur = 0;
                if (index === 0) {
                    ctx.fillStyle = isReady ? '#fff' : '#333';
                    ctx.beginPath();
                    ctx.arc(segment.x * gridSize + 5, segment.y * gridSize + 5, 2, 0, Math.PI * 2);
                    ctx.arc(segment.x * gridSize + 10, segment.y * gridSize + 5, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawFood() {
            const x = food.x * gridSize + gridSize/2;
            const y = food.y * gridSize + gridSize/2;
            ctx.shadowBlur = 18;
            ctx.shadowColor = isReady ? '#3b9e6d' : '#d45a6a';
            ctx.fillStyle = isReady ? '#3b9e6d' : '#d45a6a';
            ctx.font = 'bold 14px "JetBrains Mono", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(food.char, x, y);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = isReady ? '#fff' : 'rgba(255,255,255,0.3)';
            ctx.lineWidth = isReady ? 2 : 1.5;
            ctx.beginPath();
            ctx.arc(x, y, gridSize/2 + 2, 0, Math.PI * 2);
            ctx.stroke();
            if (isReady) {
                ctx.fillStyle = '#3b9e6d';
                ctx.font = '10px "JetBrains Mono", monospace';
                ctx.fillText('✓', x, y + gridSize + 5);
            }
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= cols; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= rows; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            drawFood();
            drawSnake();
        }

        function moveSnake() {
            if (direction.x === 0 && direction.y === 0) return;
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
            if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
                gameOver('撞墙了');
                return;
            }
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver('撞到自己');
                return;
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                if (isReady) {
                    score += 10 * level;
                    charsCollected++;
                    playEatSound();
                    if (charsCollected >= 10) {
                        levelUp();
                    } else {
                        spawnFood();
                    }
                } else {
                    gameOver('还没输入正确字符就吃食物');
                    return;
                }
                updateUI();
            } else {
                snake.pop();
            }
        }

        function levelUp() {
            level++;
            charsCollected = 0;
            speed = Math.max(80, 200 - (level - 1) * 20);
            playLevelUpSound();
            spawnFood();
            isReady = false;
            updateInputDisplay();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(() => {
                moveSnake();
                draw();
            }, speed);
        }

        function gameOver(reason) {
            isGameRunning = false;
            clearInterval(gameLoop);
            playGameOverSound();
            stopBgMusic();
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = level;
            document.getElementById('failReason').textContent = reason || '游戏结束';
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function startGame() {
            initAudio();
            initGame();
            isGameRunning = true;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(() => {
                moveSnake();
                draw();
            }, speed);
            startBgMusic();
            draw();
        }

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            const key = e.key;
            if (key === 'ArrowUp' || key === 'w' || key === 'W') {
                if (direction.y !== 1) direction = {x: 0, y: -1};
                e.preventDefault();
            } else if (key === 'ArrowDown' || key === 's' || key === 'S') {
                if (direction.y !== -1) direction = {x: 0, y: 1};
                e.preventDefault();
            } else if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
                if (direction.x !== 1) direction = {x: -1, y: 0};
                e.preventDefault();
            } else if (key === 'ArrowRight' || key === 'd' || key === 'D') {
                if (direction.x !== -1) direction = {x: 1, y: 0};
                e.preventDefault();
            } else if (key.length === 1) {
                lastInputChar = key;
                if (key === targetChar) {
                    isReady = true;
                    playReadySound();
                }
                updateInputDisplay();
            }
        });

        // roundRect polyfill for older browsers
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (r > w/2) r = w/2;
                if (r > h/2) r = h/2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        initGame();
        draw();
        window.startGame = startGame;
        window.toggleMusic = toggleMusic;
    })();
</script>
